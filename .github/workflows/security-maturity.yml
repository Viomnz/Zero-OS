name: security-maturity

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Generate SBOM
        run: python tools/generate_sbom.py

      - name: Run Vulnerability Scan
        run: python tools/vuln_scan.py

      - name: Run Security Gate
        run: python tools/security_gate.py

      - name: Sign Security Artifacts
        run: python tools/sign_artifacts.py

      - name: Verify Release Security Contracts
        run: python tools/release_verify.py

      - name: Export Compliance Evidence
        run: python tools/export_compliance_evidence.py

      - name: Upload Security Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: security/artifacts/*
