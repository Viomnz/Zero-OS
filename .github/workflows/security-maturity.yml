name: security-maturity

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest

      - name: Generate SBOM
        run: python tools/generate_sbom.py

      - name: Run Vulnerability Scan
        run: python tools/vuln_scan.py

      - name: Run Security Gate
        run: python tools/security_gate.py --profile maturity

      - name: Run Independent Runtime Validator
        run: python tools/independent_runtime_validator.py

      - name: Run Triad Balance
        run: python src/main.py "triad balance run"

      - name: Run SLO Release Gate
        run: python tools/slo_release_gate.py

      - name: Sign Security Artifacts
        run: python tools/sign_artifacts.py

      - name: Verify Release Security Contracts
        run: python tools/release_verify.py

      - name: Export Compliance Evidence
        run: python tools/export_compliance_evidence.py

      - name: Verify Security Artifact Directory
        shell: powershell
        run: |
          if (-not (Test-Path "security/artifacts")) {
            Write-Error "security/artifacts directory not found"
          }
          $files = Get-ChildItem "security/artifacts" -File -ErrorAction SilentlyContinue
          if (-not $files) {
            Write-Error "security/artifacts directory is empty"
          }

      - name: Upload Security Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: security-artifacts
          path: security/artifacts
          if-no-files-found: error
