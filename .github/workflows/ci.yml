name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run tests
        run: |
          python -m unittest -v tests.test_security_core tests.test_security_integrity_layer tests.test_signal_reliability tests.test_internal_zero_reasoner tests.test_zero_ai_gate tests.test_synchronization_layer
