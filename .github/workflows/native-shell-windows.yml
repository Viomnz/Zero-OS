name: native-shell-windows

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native-shell:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build WPF shell
        run: |
          dotnet build native_ui/ZeroOS.NativeShell/ZeroOS.NativeShell.csproj

      - name: Publish WPF shell
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\native_ui\ZeroOS.NativeShell\publish.ps1

      - name: Package portable native shell
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\native_ui\ZeroOS.NativeShell\package_portable.ps1

      - name: Package MSIX native shell
        shell: powershell
        env:
          ZERO_OS_SIGNING_PFX_PASSWORD: ${{ secrets.ZERO_OS_SIGNING_PFX_PASSWORD }}
        run: |
          powershell -ExecutionPolicy Bypass -File .\native_ui\ZeroOS.NativeShell\package_msix.ps1

      - name: Upload native shell artifact
        uses: actions/upload-artifact@v6
        with:
          name: zero-os-native-shell-windows
          path: native_ui/ZeroOS.NativeShell/publish
          if-no-files-found: error

      - name: Upload portable installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: zero-os-native-shell-portable
          path: native_ui/ZeroOS.NativeShell/installers
          if-no-files-found: error

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: zero-os-native-shell-msix
          path: native_ui/ZeroOS.NativeShell/msix/*.msix
          if-no-files-found: error

      - name: Zip native shell publish output
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          Compress-Archive -Path .\native_ui\ZeroOS.NativeShell\publish\* -DestinationPath .\native_ui\ZeroOS.NativeShell\publish\zero-os-native-shell-windows.zip -Force

      - name: Upload native shell release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native_ui/ZeroOS.NativeShell/publish/zero-os-native-shell-windows.zip
            native_ui/ZeroOS.NativeShell/installers/*.zip
            native_ui/ZeroOS.NativeShell/msix/*.msix
          generate_release_notes: true
