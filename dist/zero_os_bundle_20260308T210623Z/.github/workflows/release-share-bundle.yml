name: release-share-bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-share-bundle:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Zero OS share package
        shell: powershell
        run: |
          python src/main.py "zero os share package"

      - name: Resolve latest bundle zip
        id: bundle
        shell: powershell
        run: |
          $zip = Get-ChildItem -Path dist -Filter "zero_os_bundle_*.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $zip) {
            Write-Error "No Zero OS share bundle zip found in dist/"
          }
          "bundle_path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "bundle_name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-os-share-bundle
          path: ${{ steps.bundle.outputs.bundle_path }}
          if-no-files-found: error

      - name: Upload bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.bundle_path }}
          generate_release_notes: true
